<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Center | 24-7 Consultancy</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <h2 style="color: var(--primary-deep); margin-bottom: 8px; text-align: center;">Portal Login</h2>
        <p style="color: #64748b; text-align: center; font-size: 0.9rem; margin-bottom: 30px;">Access your dynamic data control track panel</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Security Designation Email</label>
                <input type="email" id="authEmail" class="form-control" required placeholder="name@consultancy.com">
            </div>
            <div class="form-group">
                <label>Access Control Password</label>
                <input type="password" id="authPass" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; border: none; cursor: pointer; margin-top: 10px;">Verify Identity</button>
        </form>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
