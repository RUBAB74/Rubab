<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Batches & Intakes | 24-7 Consultancy</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <header class="site-header">
        <div class="container nav-container">
            <a href="index.html" class="logo-brand">24-7<span>Consultancy</span></a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="listings.html" class="nav-link">Active Intakes</a></li>
                <li><a href="dashboard/index.html" class="nav-link">Student Portal</a></li>
                <li><a href="login.html" class="btn-nav">Sign In</a></li>
            </ul>
        </div>
    </header>

    <main class="container" style="margin-top: 50px;">
        <h2 style="color: var(--primary-deep); margin-bottom: 10px;">Global Intake Search Desk</h2>
        <p style="color: #64748b; margin-bottom: 30px;">Filter and lookup verified computational tracks for international batches instantly.</p>

        <!-- DAY 7: Search & Filter Logic Hook -->
        <div class="filter-section">
            <input type="text" id="searchBar" class="search-input" placeholder="Search by University, Program or Destination...">
            <select id="regionFilter" class="filter-select">
                <option value="all">All Global Regions</option>
                <option value="United Kingdom">United Kingdom</option>
                <option value="United States">United States</option>
                <option value="Germany">Germany</option>
            </select>
        </div>

        <!-- Dynamic Jobs Rendering Target -->
        <div id="listingsTarget" class="jobs-grid">
            <!-- JavaScript will render tracks here dynamic -->
        </div>
      <div id="applyModal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; width: 90%; max-width: 450px; max-height: 85vh; overflow-y: auto; background: #FBF8EF; border: 2px solid #D8CFB6; border-radius: 8px; box-shadow: 0 10px 30px rgba(22, 35, 63, 0.25); padding: 25px; box-sizing: border-box;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #D8CFB6;">
            <h3 style="color: #16233F; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; margin: 0; font-size: 1.3rem;">Intake Route Entry</h3>
            <button id="closeModalBtn" style="background: none; border: none; font-size: 2rem; cursor: pointer; color: #B8433D; line-height: 1; padding: 0;">&times;</button>
        </div>
        
        <p style="color: #7A7263; font-size: 0.85rem; margin-bottom: 20px; line-height: 1.4;">Submit your academic routing details for verified evaluation.</p>
        
        <form id="studentApplyForm">
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="display: block; font-size: 0.8rem; font-weight: 600; color: #16233F; margin-bottom: 5px; text-transform: uppercase;">Full Legal Name</label>
                <input type="text" id="studentName" class="form-control" required placeholder="e.g., Alizeh Khan" style="width: 100%; padding: 10px; border: 1px solid #D8CFB6; border-radius: 4px; box-sizing: border-box; background: #fff;">
            </div>
            
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="display: block; font-size: 0.8rem; font-weight: 600; color: #16233F; margin-bottom: 5px; text-transform: uppercase;">Contact Email Address</label>
                <input type="email" id="studentEmail" class="form-control" required placeholder="name@example.com" style="width: 100%; padding: 10px; border: 1px solid #D8CFB6; border-radius: 4px; box-sizing: border-box; background: #fff;">
            </div>
            
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.8rem; font-weight: 600; color: #16233F; margin-bottom: 5px; text-transform: uppercase;">Highest Academic Degree</label>
                <select id="studentEdu" class="form-control" style="width: 100%; padding: 10px; border: 1px solid #D8CFB6; border-radius: 4px; box-sizing: border-box; background: #fff; height: 42px;">
                    <option value="FSc Medical">FSc Medical</option>
                    <option value="FSc Engineering">FSc Engineering</option>
                    <option value="ICS / Computer Science">ICS / Computer Science</option>
                    <option value="A-Levels / High School">A-Levels / High School</option>
                </select>
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%; border: none; cursor: pointer; padding: 12px; background: #B8433D; color: white; font-weight: 600; border-radius: 4px; transition: background 0.2s;">Submit Route Application</button>
        </form>
    </div>

    <div id="modalOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(22, 35, 63, 0.5); backdrop-filter: blur(4px); z-index: 1999;"></div>
 </main>

    <script src="assets/js/main.js"></script>
</body>
</html>
